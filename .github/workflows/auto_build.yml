name: Auto Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest news from Eastmoney
        run: |
          pip install requests -q
          python -c "
import requests, re, json
url = 'https://newsapi.eastmoney.com/kuaixun/v1/getlist_102_ajaxResult_20_1_.html'
r = requests.get(url, timeout=15, headers={'User-Agent':'Mozilla/5.0','Referer':'https://finance.eastmoney.com/'})
r.encoding = 'utf-8'
m = re.search(r'ajaxResult=(\{.*\})', r.text, re.DOTALL)
if m:
    data = json.loads(m.group(1))
    news = []
    seen = set()
    for item in data.get('LivesList', []):
        title = re.sub(r'<[^>]+>', '', item.get('title',''))
        t = item.get('showtime','')[11:16]
        src = item.get('source','东方财富')
        if len(title) > 8 and title[:25] not in seen:
            seen.add(title[:25])
            news.append({'title':title,'time':t,'source':src,'hot':False})
    with open('news.json','w',encoding='utf-8') as f:
        json.dump(news, f, ensure_ascii=False, indent=2)
    print(f'Fetched {len(news)} news items')
"

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit static files
        run: |
          # Only commit if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html variety-*.html news.json prices.json global.json reports.json
            git commit -m "Update site - $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "Committed and pushed successfully"
          fi

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
