name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask requests

      - name: Fetch news and generate site
        run: |
          python -c "
import requests, re, json, os, base64, time
from datetime import datetime

TOKEN = os.environ.get('GITHUB_TOKEN')

def api(method, url, data=None):
    h = {'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json'}
    r = requests.request(method, url, headers=h, json=data, timeout=15)
    return r

def get_sha(path):
    r = api('GET', f'https://api.github.com/repos/astra-deep/futures-tracker/contents/{path}?ref=main')
    return r.json().get('sha') if r.status_code == 200 else None

def upload(local_path, remote_path, msg=''):
    if not os.path.exists(local_path):
        return
    with open(local_path, 'rb') as f:
        content = base64.b64encode(f.read()).decode('ascii')
    sha = get_sha(remote_path)
    payload = {'message': msg or f'Update {remote_path}', 'content': content, 'branch': 'main'}
    if sha:
        payload['sha'] = sha
    r = api('PUT', f'https://api.github.com/repos/astra-deep/futures-tracker/contents/{remote_path}', payload)
    print(f'{\"✅\" if r.status_code in (200,201) else \"❌\"} {remote_path} ({r.status_code})')

# Fetch news
try:
    url = 'https://newsapi.eastmoney.com/kuaixun/v1/getlist_102_ajaxResult_20_1_.html'
    r = requests.get(url, timeout=15, headers={'User-Agent':'Mozilla/5.0','Referer':'https://finance.eastmoney.com/'})
    r.encoding = 'utf-8'
    m = re.search(r'ajaxResult=(\{.*\})', r.text, re.DOTALL)
    if m:
        data = json.loads(m.group(1))
        news = []
        seen = set()
        for item in data.get('LivesList', []):
            title = re.sub(r'<[^>]+>', '', item.get('title',''))
            t = item.get('showtime','')[11:16]
            src = item.get('source','东方财富')
            if len(title) > 8 and title[:25] not in seen:
                seen.add(title[:25])
                news.append({'title':title,'time':t,'source':src,'hot':False})
        with open('news.json','w',encoding='utf-8') as f:
            json.dump(news, f, ensure_ascii=False, indent=2)
        print(f'News: {len(news)} items')
except Exception as e:
    print(f'News error: {e}')

# Upload all files in current dir
for fname in os.listdir('.'):
    if fname.startswith('.') or fname == 'workflow_dispatch':
        continue
    if os.path.isfile(fname):
        upload(fname, fname, f'Update {fname} - {datetime.now().strftime(\"%H:%M\")}')
"
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
