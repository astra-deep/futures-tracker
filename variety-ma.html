<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甲醇 (MA) - 大宗商品追踪</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1419;color:#e7e9ea;min-height:100vh;font-size:15px}
a{color:#6366f1;text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:900px;margin:0 auto;padding:16px}
.back{margin-bottom:16px}
.hero{background:#1a1f26;border-radius:12px;padding:24px;margin-bottom:16px}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.hero-name{font-size:24px;font-weight:700;color:#fff}
.hero-sym{color:#8899a6;font-size:12px;margin-top:4px}
.hero-right{text-align:right}
.hero-price{font-size:30px;font-weight:700;color:#fff}
.hero-chg{font-size:16px;margin-top:4px}
.hero-chg.up{color:#ef5350}.hero-chg.down{color:#26a69a}
.dir-badge{display:inline-block;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;margin:14px 0 6px}
.dir-up{background:rgba(239,83,80,0.15);color:#ef5350}
.dir-down{background:rgba(38,166,154,0.15);color:#26a69a}
.dir-neutral{background:rgba(99,102,241,0.15);color:#a5b4fc}
.section{background:#1a1f26;border-radius:10px;padding:18px;margin-bottom:12px}
.section-title{color:#8899a6;font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:10px}
.levels{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.level{background:#1e242b;border-radius:8px;padding:12px;text-align:center}
.level-price{display:block;font-size:15px;font-weight:700;color:#fff}
.level-desc{display:block;font-size:11px;color:#8899a6;margin-top:4px}
.analysis-row{margin-bottom:10px;line-height:1.6}
.analysis-label{color:#8899a6;font-size:12px}
.analysis-value{color:#e7e9ea;font-size:13px}
.signals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.signal{background:#1a1f26;border-radius:10px;padding:16px}
.signal-title{font-size:11px;color:#8899a6;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.signal-text{font-size:13px;line-height:1.5}
.signal-long{color:#34d399}.signal-short{color:#ef5350}.signal-reversal{color:#f59e0b}
.signal-full{grid-column:1/-1}
.back-btn{display:block;width:100%;text-align:center;background:#1e242b;color:#8899a6;border:none;border-radius:8px;padding:14px;cursor:pointer;font-size:13px;margin-top:20px;text-decoration:none}
.back-btn:hover{background:#252a30}
</style>
</head>
<body>
<div class="container">
<div class="back"><a href="index.html">← 返回首页</a></div>
<div class="hero">
  <div class="hero-top">
    <div>
      <div class="hero-name">甲醇</div>
      <div class="hero-sym">MA · 元/吨 · 更新 20260424</div>
    </div>
    <div class="hero-right">
      <div class="hero-price">¥2,895</div>
      <div class="hero-chg up">▲ 0.83%</div>
    </div>
  </div>
  <div class="dir-badge dir-neutral">📊 关注 · 📊 能源</div>
</div>

<div class="section">
  <div class="section-title">🎯 关键价位</div>
  <div class="levels"><div class="level-item neutral"><span class="level-price">¥3,200+</span><span class="level-desc">偏强</span></div><div class="level-item neutral"><span class="level-price">¥2,700-3,200</span><span class="level-desc">震荡</span></div><div class="level-item long"><span class="level-price">¥2,400以下</span><span class="level-desc">成本支撑区</span></div></div>
</div>

<div class="section">
  <div class="section-title">📐 宏观分析</div>
  <div class="analysis-row"><span class="analysis-label">核心指标：</span><span class="analysis-value">煤炭价格·MTO开工率</span></div>
  <div class="analysis-row"><span class="analysis-label">当前判断：</span><span class="analysis-value">成本支撑+需求恢复</span></div>
  <div class="analysis-row"><span class="analysis-label">观察点：</span><span class="analysis-value">MTO开工率</span></div>
</div>

<div class="section">
  <div class="section-title">⚡ 供需分析</div>
  <div class="analysis-row"><span class="analysis-label">核心指标：</span><span class="analysis-value">甲醇装置开工率·库存</span></div>
  <div class="analysis-row"><span class="analysis-label">当前判断：</span><span class="analysis-value">供应充足</span></div>
  <div class="analysis-row"><span class="analysis-label">观察点：</span><span class="analysis-value">甲醇港口库存</span></div>
</div>

<div class="signals">
  <div class="signal">
    <div class="signal-title">✅ 做多信号</div>
    <div class="signal-text signal-long">MTO复产+去库</div>
  </div>
  <div class="signal">
    <div class="signal-title">🔴 做空信号</div>
    <div class="signal-text signal-short">MTO停车+累库</div>
  </div>
  <div class="signal signal-full">
    <div class="signal-title">⚠️ 反转信号</div>
    <div class="signal-text signal-reversal">甲醇港口库存持续下降</div>
  </div>
</div>

<a href="index.html" class="back-btn">← 返回品种列表</a>
</div>
</body>
</html>
